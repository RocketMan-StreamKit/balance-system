<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer balance</title>
    <script>
      (function () {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href =
          location.protocol +
          '//' +
          location.hostname +
          ':' +
          location.port +
          '/data/styles.css';
        document.head.appendChild(link);
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="App balance-app">
      <header class="balance-header">
        <div>
          <h1 id="title">Viewer balance</h1>
          <p class="balance-meta">
            <span id="currency-label"></span>
            <span id="viewer-count"></span>
          </p>
        </div>
        <div class="balance-header-actions">
          <label class="balance-field balance-field--inline">
            <span id="viewer-page-label">Viewer page</span>
            <div class="balance-copy-row">
              <input id="viewer-page-url" type="text" readonly />
              <button id="copy-page-url" class="secondary-action" type="button">Copy</button>
              <button
                id="open-page-url"
                class="secondary-action balance-icon-action"
                type="button"
                aria-label="Open in browser"
                title="Open in browser"
              >
                ↗
              </button>
            </div>
          </label>
        </div>
      </header>

      <section class="balance-toolbar balance-panel-card">
        <input id="search" type="search" placeholder="Search…" />
        <select id="sort">
          <option value="balance_desc">Balance ↓</option>
          <option value="balance_asc">Balance ↑</option>
          <option value="login_asc">Login A–Z</option>
          <option value="login_desc">Login Z–A</option>
        </select>
        <div class="balance-toolbar-actions">
          <button id="import-streamkit" class="secondary-action" type="button">
            Import from StreamKit
          </button>
          <button id="add-viewer" class="primary-action" type="button">Add viewer</button>
        </div>
      </section>

      <section id="viewers-table" class="balance-table balance-panel-card">
        <table>
          <thead>
            <tr>
              <th class="balance-col-select">
                <input id="select-all" type="checkbox" title="Select all" />
              </th>
              <th id="col-name">Name</th>
              <th id="col-balance">Balance</th>
              <th id="actions-header">Actions</th>
            </tr>
          </thead>
          <tbody id="viewers-body">
            <tr><td colspan="4" id="loading-cell">Loading…</td></tr>
          </tbody>
        </table>
      </section>

      <footer id="bulk-bar" class="balance-bulk-bar balance-bulk-bar--hidden" hidden>
        <span id="bulk-selected-label"></span>
        <div class="balance-bulk-actions">
          <button id="bulk-delete" class="secondary-action" type="button">Delete</button>
          <button id="bulk-reset" class="secondary-action" type="button">Reset balance</button>
          <button id="bulk-add" class="secondary-action" type="button">Add balance</button>
          <button id="bulk-subtract" class="secondary-action" type="button">Subtract balance</button>
          <button id="bulk-merge" class="secondary-action" type="button">Merge</button>
        </div>
      </footer>
    </div>

    <dialog id="editor-dialog" class="balance-dialog">
      <form id="editor-form" class="balance-dialog-form" method="dialog">
        <h2 id="editor-title">Add viewer</h2>
        <label class="balance-field">
          <span id="login-label">Twitch login</span>
          <input id="editor-login" type="text" required />
        </label>
        <label class="balance-field">
          <span id="balance-label">Balance</span>
          <input id="editor-balance" type="number" step="0.01" required />
        </label>
        <div id="editor-adjust-section" class="balance-editor-adjust balance-panel--hidden" hidden>
          <p id="editor-current-balance" class="balance-hint"></p>
          <label class="balance-field">
            <span id="editor-amount-label">Amount</span>
            <input id="editor-amount" type="number" min="0.01" step="0.01" />
          </label>
          <label class="balance-field">
            <span id="editor-amount-currency-label">Currency</span>
            <select id="editor-amount-currency"></select>
          </label>
        </div>
        <div class="balance-dialog-actions balance-dialog-actions--wrap">
          <button type="button" id="editor-cancel" class="secondary-action">Cancel</button>
          <button type="button" id="editor-subtract" class="secondary-action" hidden>
            Subtract balance
          </button>
          <button type="button" id="editor-add" class="secondary-action" hidden>
            Add balance
          </button>
          <button type="submit" class="primary-action" id="editor-save">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="import-dialog" class="balance-dialog balance-dialog--import">
      <form id="import-form" class="balance-dialog-form balance-dialog-form--import" method="dialog">
        <h2 id="import-title">Import from StreamKit</h2>
        <p id="import-description" class="balance-hint"></p>
        <label class="balance-field">
          <span id="import-currency-label">Source currency</span>
          <select id="import-currency" required></select>
        </label>
        <label class="balance-field balance-field--grow">
          <span id="import-json-label">JSON data</span>
          <textarea id="import-json" rows="8" required></textarea>
        </label>
        <div class="balance-dialog-actions">
          <button type="button" id="import-cancel" class="secondary-action">Cancel</button>
          <button type="submit" class="primary-action" id="import-submit">Import</button>
        </div>
      </form>
    </dialog>

    <dialog id="bulk-amount-dialog" class="balance-dialog">
      <form id="bulk-amount-form" class="balance-dialog-form" method="dialog">
        <h2 id="bulk-amount-title">Add balance</h2>
        <label class="balance-field">
          <span id="bulk-amount-label">Amount</span>
          <input id="bulk-amount-value" type="number" min="0.01" step="0.01" required />
        </label>
        <label class="balance-field">
          <span id="bulk-amount-currency-label">Currency</span>
          <select id="bulk-amount-currency" required></select>
        </label>
        <div class="balance-dialog-actions">
          <button type="button" id="bulk-amount-cancel" class="secondary-action">Cancel</button>
          <button type="submit" class="primary-action" id="bulk-amount-submit">Apply</button>
        </div>
      </form>
    </dialog>

    <dialog id="bulk-merge-dialog" class="balance-dialog">
      <form id="bulk-merge-form" class="balance-dialog-form" method="dialog">
        <h2 id="bulk-merge-title">Merge viewers</h2>
        <p id="bulk-merge-hint" class="balance-hint"></p>
        <label class="balance-field">
          <span id="bulk-merge-id-label">Twitch ID</span>
          <div class="balance-merge-row">
            <select id="bulk-merge-id-source" class="bulk-merge-source"></select>
            <input id="bulk-merge-id" type="text" required />
          </div>
        </label>
        <label class="balance-field">
          <span id="bulk-merge-login-label">Login</span>
          <div class="balance-merge-row">
            <select id="bulk-merge-login-source" class="bulk-merge-source"></select>
            <input id="bulk-merge-login" type="text" required />
          </div>
        </label>
        <label class="balance-field">
          <span id="bulk-merge-name-label">Display name</span>
          <div class="balance-merge-row">
            <select id="bulk-merge-name-source" class="bulk-merge-source"></select>
            <input id="bulk-merge-name" type="text" required />
          </div>
        </label>
        <label class="balance-field">
          <span id="bulk-merge-balance-label">Balance</span>
          <div class="balance-merge-row">
            <select id="bulk-merge-balance-source" class="bulk-merge-source"></select>
            <input id="bulk-merge-balance" type="number" min="0" step="0.01" required />
          </div>
        </label>
        <div class="balance-dialog-actions">
          <button type="button" id="bulk-merge-cancel" class="secondary-action">Cancel</button>
          <button type="submit" class="primary-action" id="bulk-merge-submit">Merge</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
